services:
  nostr-relay:
    image: scsibug/nostr-rs-relay:0.9.0
    container_name: openprints-nostr-relay
    restart: unless-stopped
    ports:
      - "7447:7447"
    volumes:
      - ./nostr-relay.config.toml:/usr/src/app/config.toml:ro
      - nostr_relay_data:/usr/src/app/db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7447/"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  nostr_relay_data:
